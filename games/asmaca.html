<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OyunEvi — Adam Asmaca</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .game-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }
    .game-main {
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .orb1 { width:400px;height:400px;background:#7209b7;opacity:0.08;filter:blur(100px);top:-100px;right:-80px; }
    .orb2 { width:300px;height:300px;background:#b5179e;opacity:0.07;filter:blur(80px);bottom:-60px;left:-40px; }

    .game-topbar {
      width:100%; display:flex; align-items:center;
      justify-content:space-between; margin-bottom:36px; z-index:2; position:relative;
    }
    .back-btn {
      display:flex; align-items:center; gap:8px;
      background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08);
      border-radius:10px; padding:8px 14px; font-size:13px;
      color:#8888aa; cursor:pointer; font-family:inherit; transition:color 0.15s;
    }
    .back-btn:hover { color:#f0f0ff; }
    .room-pill {
      display:flex; align-items:center; gap:8px;
      background:rgba(114,9,183,0.12); border:1px solid rgba(114,9,183,0.25);
      border-radius:50px; padding:6px 16px; font-size:12px; color:#d084ff;
    }
    .room-code { font-weight:700; letter-spacing:2px; }

    /* GALLOWS */
    .gallows-wrap { position:relative; z-index:2; margin-bottom:24px; }
    .gallows-svg { display:block; }

    /* WORD DISPLAY */
    .word-display {
      display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
      margin-bottom:28px; z-index:2; position:relative;
    }
    .letter-box {
      width:36px; height:44px;
      border-bottom:2px solid rgba(255,255,255,0.2);
      display:flex; align-items:center; justify-content:center;
      font-size:22px; font-weight:800; color:#f0f0ff;
      transition:all 0.3s;
    }
    .letter-box.revealed { border-color:#7209b7; color:#d084ff; }

    /* WRONG LETTERS */
    .wrong-letters {
      display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
      margin-bottom:20px; z-index:2; position:relative; min-height:28px;
    }
    .wrong-letter {
      width:28px;height:28px; border-radius:8px;
      background:rgba(230,57,70,0.15); border:1px solid rgba(230,57,70,0.3);
      color:#ff8a94; font-size:13px; font-weight:700;
      display:flex;align-items:center;justify-content:center;
    }

    /* KEYBOARD */
    .keyboard {
      display:flex; flex-direction:column; gap:6px;
      z-index:2; position:relative;
    }
    .kb-row { display:flex; gap:6px; justify-content:center; }
    .kb-key {
      width:38px; height:42px; border-radius:8px;
      background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08);
      color:#f0f0ff; font-size:13px; font-weight:600;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background 0.15s, transform 0.1s; font-family:inherit;
    }
    .kb-key:hover:not(:disabled) { background:rgba(114,9,183,0.2); border-color:rgba(114,9,183,0.4); }
    .kb-key:active:not(:disabled) { transform:scale(0.93); }
    .kb-key:disabled { opacity:0.25; cursor:default; }
    .kb-key.hit  { background:rgba(114,9,183,0.25); border-color:rgba(114,9,183,0.5); color:#d084ff; }
    .kb-key.miss { background:rgba(230,57,70,0.12); border-color:rgba(230,57,70,0.2); color:#ff8a94; }

    /* STATUS */
    .status-bar {
      display:flex; gap:20px; margin-bottom:20px;
      z-index:2; position:relative;
    }
    .stat-chip {
      background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07);
      border-radius:10px; padding:8px 16px; font-size:12px; color:#666688;
      display:flex; align-items:center; gap:6px;
    }
    .stat-chip span { font-weight:700; color:#f0f0ff; }

    /* GAME OVER */
    .game-over {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.75); backdrop-filter:blur(8px);
      z-index:200; align-items:center; justify-content:center;
    }
    .game-over.show { display:flex; }
    .go-card {
      background:#0f0f22; border:1px solid rgba(255,255,255,0.1);
      border-radius:20px; padding:40px 36px; text-align:center;
      animation:modalPop 0.3s cubic-bezier(.34,1.56,.64,1) both;
      width:380px; max-width:90vw;
    }
    @keyframes modalPop {
      from{opacity:0;transform:scale(0.9);}
      to{opacity:1;transform:scale(1);}
    }
    .go-icon { font-size:52px; margin-bottom:12px; }
    .go-title { font-size:24px; font-weight:900; color:#f0f0ff; margin-bottom:8px; }
    .go-word  { font-size:14px; color:#666688; margin-bottom:24px; }
    .go-word strong { color:#d084ff; font-size:18px; }
    .go-btns { display:flex; gap:10px; }
    .go-btn  {
      flex:1; padding:12px; border-radius:12px;
      font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; border:none;
    }
    .go-btn-primary { background:#7209b7; color:#fff; box-shadow:0 4px 16px rgba(114,9,183,0.3); }
    .go-btn-ghost   { background:rgba(255,255,255,0.05); color:#8888aa; border:1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body>

<div class="game-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">🎮</div>
      <span>OyunEvi</span>
    </div>
    <div class="menu-label">Oyun</div>
    <nav class="menu">
      <a class="menu-item" href="../index.html">
        <div class="menu-icon">🏠</div> Ana Sayfa
      </a>
      <a class="menu-item active" href="#">
        <div class="menu-icon">🪢</div> Adam Asmaca
      </a>
      <a class="menu-item" href="uno.html">
        <div class="menu-icon">🃏</div> UNO
      </a>
      <a class="menu-item" href="bilgi.html">
        <div class="menu-icon">💡</div> Bilgi Yarışması
      </a>
    </nav>
    <div class="sidebar-spacer"></div>
    <div class="online-box">
      <div class="online-row">
        <span class="pulse-dot"></span>
        <span class="online-count" id="onlineCount">—</span>
      </div>
      <div class="online-sub">şu an oynuyor</div>
    </div>
  </aside>

  <!-- GAME MAIN -->
  <main class="game-main">
    <div class="orb orb1" style="position:absolute;border-radius:50%;pointer-events:none;z-index:0;"></div>
    <div class="orb orb2" style="position:absolute;border-radius:50%;pointer-events:none;z-index:0;"></div>

    <div class="game-topbar">
      <button class="back-btn" onclick="window.location.href='../index.html'">← Geri</button>
      <div style="font-size:16px;font-weight:800;color:#f0f0ff;z-index:2;position:relative;">Adam Asmaca</div>
      <div class="room-pill">
        🪢 <span>Tek Oyuncu</span>
      </div>
    </div>

    <!-- STATUS -->
    <div class="status-bar">
      <div class="stat-chip">Hak: <span id="livesLeft">6</span></div>
      <div class="stat-chip">Kategori: <span id="categoryName">—</span></div>
      <div class="stat-chip">Skor: <span id="scoreDisplay">0</span></div>
    </div>

    <!-- GALLOWS SVG -->
    <div class="gallows-wrap">
      <svg class="gallows-svg" width="200" height="200" viewBox="0 0 200 200">
        <!-- Yapı -->
        <line x1="20" y1="190" x2="180" y2="190" stroke="#333355" stroke-width="3" stroke-linecap="round"/>
        <line x1="60" y1="190" x2="60" y2="20"  stroke="#333355" stroke-width="3" stroke-linecap="round"/>
        <line x1="60" y1="20"  x2="130" y2="20" stroke="#333355" stroke-width="3" stroke-linecap="round"/>
        <line x1="130" y1="20" x2="130" y2="45" stroke="#333355" stroke-width="3" stroke-linecap="round"/>
        <!-- Adam parçaları (id ile JS kontrol eder) -->
        <circle id="p-head"  cx="130" cy="58"  r="13"  fill="none" stroke="#7209b7" stroke-width="2.5" opacity="0"/>
        <line   id="p-body"  x1="130" y1="71" x2="130" y2="120" stroke="#7209b7" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
        <line   id="p-larm"  x1="130" y1="85" x2="108" y2="108" stroke="#7209b7" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
        <line   id="p-rarm"  x1="130" y1="85" x2="152" y2="108" stroke="#7209b7" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
        <line   id="p-lleg"  x1="130" y1="120" x2="108" y2="150" stroke="#7209b7" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
        <line   id="p-rleg"  x1="130" y1="120" x2="152" y2="150" stroke="#7209b7" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
      </svg>
    </div>

    <!-- KELIME DISPLAY -->
    <div class="word-display" id="wordDisplay"></div>

    <!-- YANLIŞ HARFLER -->
    <div class="wrong-letters" id="wrongLetters"></div>

    <!-- KLAVYE -->
    <div class="keyboard" id="keyboard"></div>
  </main>
</div>

<!-- GAME OVER MODAL -->
<div class="game-over" id="gameOver">
  <div class="go-card">
    <div class="go-icon" id="goIcon">🎉</div>
    <div class="go-title" id="goTitle">Tebrikler!</div>
    <div class="go-word" id="goWord">Kelime: <strong>—</strong></div>
    <div class="go-btns">
      <button class="go-btn go-btn-primary" onclick="newGame()">Yeniden Oyna</button>
      <button class="go-btn go-btn-ghost" onclick="window.location.href='../index.html'">Ana Sayfa</button>
    </div>
  </div>
</div>

<script>
// ── KELIME LİSTESİ ──
const WORDS = {
  'Hayvanlar':  ['ASLAN','KAPLAN','FİL','ZÜRafa','PENGUEN','KANGURU','AKBAba','AKBABA','SINCAP','KIRPI','YUNUS','BALiNA','BALINA','AKASYA','LEOPAR'],
  'Ülkeler':    ['TÜRKİYE','JAPONYA','BREZİLYA','ARJANTIN','MISIR','İSVEÇ','NORVEÇ','HOLLANDA','PORTEKİZ','AVUSTRALYA'],
  'Yiyecekler': ['BAKLAVA','BÖREK','MANTARLI','LAZANYA','SUSHI','PIZZA','HAMBURGER','DÖNER','KEBAP','MAKARNA'],
  'Spor':       ['FUTBOL','BASKETBOL','YÜZME','GİMNASTİK','BOKS','TENIS','VOLEYBOL','GÜREŞ','JUDO','ATLETIZM'],
  'Meslekler':  ['MİMAR','DOKTOR','MÜHENDİS','AVUKAT','ÖĞRETMEN','YAZILIMCI','TASARIMCI','MUHASEBECİ','HEMŞİRE','GAZETECİ'],
};

const PARTS = ['p-head','p-body','p-larm','p-rarm','p-lleg','p-rleg'];
const TR_ROWS = [
  ['Q','W','E','R','T','Y','U','I','O','P','Ğ','Ü'],
  ['A','S','D','F','G','H','J','K','L','Ş','İ'],
  ['Z','X','C','V','B','N','M','Ö','Ç']
];

let secretWord = '';
let guessed    = new Set();
let wrong      = [];
let score      = 0;
let gameActive = false;

function pickWord() {
  const cats = Object.keys(WORDS);
  const cat  = cats[Math.floor(Math.random() * cats.length)];
  const words = WORDS[cat];
  const word  = words[Math.floor(Math.random() * words.length)];
  document.getElementById('categoryName').textContent = cat;
  return word.toUpperCase();
}

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  TR_ROWS.forEach(row => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'kb-row';
    row.forEach(letter => {
      const btn = document.createElement('button');
      btn.className = 'kb-key';
      btn.textContent = letter;
      btn.id = 'key-' + letter;
      btn.onclick = () => guess(letter);
      rowDiv.appendChild(btn);
    });
    kb.appendChild(rowDiv);
  });
}

function renderWord() {
  const wd = document.getElementById('wordDisplay');
  wd.innerHTML = '';
  secretWord.split('').forEach(ch => {
    const box = document.createElement('div');
    box.className = 'letter-box' + (guessed.has(ch) ? ' revealed' : '');
    box.textContent = guessed.has(ch) ? ch : '';
    wd.appendChild(box);
  });
}

function renderWrong() {
  const wr = document.getElementById('wrongLetters');
  wr.innerHTML = '';
  wrong.forEach(ch => {
    const el = document.createElement('div');
    el.className = 'wrong-letter';
    el.textContent = ch;
    wr.appendChild(el);
  });
}

function updateGallows() {
  PARTS.forEach((id, i) => {
    document.getElementById(id).style.opacity = i < wrong.length ? '1' : '0';
  });
  document.getElementById('livesLeft').textContent = 6 - wrong.length;
}

function guess(letter) {
  if (!gameActive || guessed.has(letter)) return;
  guessed.add(letter);

  const btn = document.getElementById('key-' + letter);
  if (secretWord.includes(letter)) {
    btn?.classList.add('hit');
    score += 10;
  } else {
    btn?.classList.add('miss');
    wrong.push(letter);
  }

  btn && (btn.disabled = true);
  renderWord();
  renderWrong();
  updateGallows();
  document.getElementById('scoreDisplay').textContent = score;
  checkEnd();
}

function checkEnd() {
  const won = secretWord.split('').every(ch => guessed.has(ch));
  const lost = wrong.length >= 6;
  if (won || lost) {
    gameActive = false;
    setTimeout(() => showGameOver(won), 500);
  }
}

function showGameOver(won) {
  document.getElementById('goIcon').textContent  = won ? '🎉' : '💀';
  document.getElementById('goTitle').textContent = won ? 'Tebrikler!' : 'Oyun Bitti!';
  document.getElementById('goWord').innerHTML    = `Kelime: <strong>${secretWord}</strong>`;
  if (won) score += 50;
  document.getElementById('gameOver').classList.add('show');
}

function newGame() {
  guessed    = new Set();
  wrong      = [];
  secretWord = pickWord();
  gameActive = true;
  document.getElementById('gameOver').classList.remove('show');
  buildKeyboard();
  renderWord();
  renderWrong();
  updateGallows();
  document.getElementById('scoreDisplay').textContent = score;
}

// Klavyeden de harf girilebilsin
document.addEventListener('keydown', (e) => {
  const letter = e.key.toUpperCase();
  const trMap  = {'I':'İ','i':'İ'};
  const mapped = trMap[e.key] || letter;
  if (mapped.length === 1 && /[A-ZÇĞİÖŞÜ]/.test(mapped)) {
    guess(mapped);
  }
});

// Online sayısı (demo)
document.getElementById('onlineCount').textContent = Math.floor(Math.random()*30+10) + ' kişi';

// Başlat
newGame();
</script>
</body>
</html>
