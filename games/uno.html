<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OyunEvi — UNO</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --red:#e63946;--blue:#0077b6;--green:#2d9e47;--yellow:#f4c430;--black:#1a1a2e;
      --bg:#070b12;--card-bg:#0d1117;--border:rgba(255,255,255,0.07);
    }
    body{background:var(--bg);font-family:'Segoe UI',sans-serif;color:#f0f0ff;min-height:100vh;overflow-x:hidden;}

    /* ── CANVAS CONFETTI ── */
    #confettiCanvas{position:fixed;inset:0;pointer-events:none;z-index:999;}

    /* ── TOAST ── */
    .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(10,10,24,0.97);border:1px solid rgba(255,255,255,0.15);border-radius:50px;padding:11px 26px;font-size:13px;font-weight:700;color:#f0f0ff;z-index:500;opacity:0;transition:opacity 0.3s,transform 0.3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    /* ── TURN BANNER ── */
    .turn-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:rgba(10,10,24,0.97);border:2px solid rgba(255,255,255,0.15);border-radius:20px;padding:24px 48px;text-align:center;z-index:600;opacity:0;transition:all 0.4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
    .turn-banner.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
    .turn-banner-name{font-size:28px;font-weight:900;margin-bottom:4px;}
    .turn-banner-sub{font-size:13px;color:#555577;}

    /* ── SHAKE ── */
    @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-10px);}40%{transform:translateX(10px);}60%{transform:translateX(-8px);}80%{transform:translateX(8px);}}
    .shake{animation:shake 0.5s ease both;}

    /* ── RED FLASH ── */
    .flash-overlay{position:fixed;inset:0;background:rgba(230,57,70,0.25);pointer-events:none;z-index:700;opacity:0;transition:opacity 0.15s;}
    .flash-overlay.flash{opacity:1;}

    /* ── LOBBY ── */
    #lobbyScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
      background:radial-gradient(ellipse at 20% 50%,rgba(230,57,70,0.08) 0%,transparent 60%),
                 radial-gradient(ellipse at 80% 20%,rgba(114,9,183,0.08) 0%,transparent 60%);}
    .lobby-card{background:#0d1117;border:1px solid var(--border);border-radius:22px;padding:44px 38px;width:480px;max-width:100%;animation:fadeUp 0.4s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    .lobby-title{font-size:30px;font-weight:900;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
    .lobby-sub{font-size:13px;color:#555577;margin-bottom:28px;}
    .room-code-big{background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.25);border-radius:14px;padding:18px 20px;text-align:center;font-size:34px;font-weight:900;color:#ff8a94;letter-spacing:12px;font-family:monospace;margin-bottom:14px;}
    .copy-btn{width:100%;padding:11px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:none;background:rgba(255,255,255,0.05);color:#8888aa;border:1px solid rgba(255,255,255,0.1);margin-bottom:24px;transition:background 0.15s;}
    .copy-btn:hover{background:rgba(255,255,255,0.09);color:#f0f0ff;}
    .players-label{font-size:10px;color:#333355;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
    .players-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;min-height:60px;}
    .player-item{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:10px 14px;animation:fadeUp 0.3s ease both;}
    .player-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
    .player-name{font-size:13px;font-weight:600;flex:1;}
    .host-badge{font-size:10px;color:#ffd166;background:rgba(255,209,102,0.12);border-radius:6px;padding:2px 8px;}
    .waiting-badge{font-size:10px;color:#555577;}
    .start-btn{width:100%;padding:15px;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;border:none;background:linear-gradient(135deg,#e63946,#c1121f);color:#fff;box-shadow:0 4px 20px rgba(230,57,70,0.35);transition:opacity 0.15s,transform 0.15s;}
    .start-btn:hover:not(:disabled){opacity:0.9;transform:translateY(-2px);}
    .start-btn:disabled{opacity:0.4;cursor:default;transform:none;}
    .back-link{display:block;text-align:center;margin-top:14px;font-size:12px;color:#444466;cursor:pointer;}
    .back-link:hover{color:#8888aa;}

    /* ── GAME SCREEN ── */
    #gameScreen{display:none;min-height:100vh;flex-direction:column;
      background:radial-gradient(ellipse at 50% 40%,rgba(20,40,20,0.6) 0%,var(--bg) 70%);}

    /* TOP BAR */
    .gtop{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(7,11,18,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;}
    .gtop-logo{font-size:16px;font-weight:900;display:flex;align-items:center;gap:8px;}
    .room-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:50px;padding:5px 14px;font-size:11px;color:#8888aa;}
    .room-pill span{font-weight:700;color:#f0f0ff;letter-spacing:2px;}

    /* TIMER BAR */
    .timer-wrap{height:4px;background:rgba(255,255,255,0.06);position:relative;overflow:hidden;}
    .timer-fill{height:100%;background:linear-gradient(90deg,#22c55e,#ffd166);transition:width 1s linear,background 1s;width:100%;}
    .timer-fill.danger{background:linear-gradient(90deg,#e63946,#ff8a94);}
    .timer-label{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;color:#555577;}

    /* OPPONENTS */
    .opponents-row{display:flex;gap:10px;padding:12px 20px;flex-wrap:wrap;background:rgba(255,255,255,0.01);border-bottom:1px solid rgba(255,255,255,0.04);}
    .opp-chip{display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,0.07);border-radius:50px;padding:6px 14px 6px 8px;font-size:12px;color:#8888aa;transition:all 0.4s;position:relative;}
    .opp-chip.active-turn{border-color:#ffd166;background:rgba(255,209,102,0.1);color:#ffd166;box-shadow:0 0 16px rgba(255,209,102,0.2);}
    .opp-chip.danger-zone{border-color:#e63946 !important;background:rgba(230,57,70,0.1) !important;color:#ff8a94 !important;}
    .opp-chip.danger-zone .opp-avatar{animation:pulse 1s ease-in-out infinite;}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(230,57,70,0.4);}50%{box-shadow:0 0 0 6px rgba(230,57,70,0);}}
    .opp-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
    .opp-cards{font-size:10px;color:#444466;margin-left:4px;}
    .danger-badge{font-size:9px;font-weight:700;background:rgba(230,57,70,0.2);color:#ff8a94;border-radius:6px;padding:1px 6px;margin-left:4px;}

    /* TABLE */
    .table-area{display:flex;align-items:center;justify-content:center;gap:32px;padding:28px 24px;flex:1;position:relative;}

    /* DECK */
    .deck-pile{width:82px;height:118px;border-radius:14px;
      background:linear-gradient(135deg,#1a1a2e,#16213e);
      border:2px solid rgba(255,255,255,0.15);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;font-size:0;transition:transform 0.2s,box-shadow 0.2s;
      box-shadow:0 6px 24px rgba(0,0,0,0.6);position:relative;overflow:hidden;}
    .deck-pile::before{content:'';position:absolute;inset:6px;border-radius:9px;border:1px solid rgba(255,255,255,0.08);}
    .deck-pile::after{content:'🃏';font-size:28px;display:flex;align-items:center;justify-content:center;}
    .deck-pile:hover{transform:translateY(-6px) scale(1.04);box-shadow:0 14px 40px rgba(0,0,0,0.7);}
    .deck-count{position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);font-size:10px;color:#444466;white-space:nowrap;}

    /* DISCARD */
    .discard-pile{width:82px;height:118px;border-radius:14px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      box-shadow:0 10px 36px rgba(0,0,0,0.6);
      border:3px solid rgba(255,255,255,0.3);
      position:relative;overflow:hidden;transition:all 0.3s;}

    /* REAL UNO CARD STYLE */
    .uno-card{
      width:72px;height:108px;border-radius:14px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      cursor:pointer;position:relative;flex-shrink:0;
      border:3px solid rgba(255,255,255,0.9);
      box-shadow:0 4px 14px rgba(0,0,0,0.5);
      transition:transform 0.2s,box-shadow 0.2s,opacity 0.2s;
      user-select:none;overflow:hidden;
    }
    /* Inner oval */
    .uno-card::before{
      content:'';position:absolute;inset:5px;
      border-radius:50%;
      background:rgba(255,255,255,0.12);
      transform:rotate(-30deg) scaleX(0.6);
    }
    .uno-card:hover:not(.unplayable){transform:translateY(-16px) scale(1.08);box-shadow:0 20px 40px rgba(0,0,0,0.6);z-index:10;}
    .uno-card.unplayable{opacity:0.28;cursor:not-allowed;filter:grayscale(0.3);}
    .uno-card.unplayable:hover{transform:none;box-shadow:0 4px 14px rgba(0,0,0,0.5);}

    .card-tl{position:absolute;top:5px;left:7px;font-size:13px;font-weight:900;line-height:1;text-align:center;}
    .card-br{position:absolute;bottom:5px;right:7px;font-size:13px;font-weight:900;line-height:1;text-align:center;transform:rotate(180deg);}
    .card-mid{font-size:30px;font-weight:900;line-height:1;position:relative;z-index:1;}

    .card-red   {background:linear-gradient(135deg,#e63946,#9b0b16);}
    .card-blue  {background:linear-gradient(135deg,#0077b6,#023e8a);}
    .card-green {background:linear-gradient(135deg,#2d9e47,#1a5e2a);}
    .card-yellow{background:linear-gradient(135deg,#f4c430,#c99000);color:#1a0f00 !important;}
    .card-black {background:linear-gradient(135deg,#2d2d44,#0d0d18);}

    /* Playable glow */
    .card-red.playable   {box-shadow:0 4px 14px rgba(230,57,70,0.5);}
    .card-blue.playable  {box-shadow:0 4px 14px rgba(0,119,182,0.5);}
    .card-green.playable {box-shadow:0 4px 14px rgba(45,158,71,0.5);}
    .card-yellow.playable{box-shadow:0 4px 14px rgba(244,196,48,0.5);}
    .card-black.playable {box-shadow:0 4px 14px rgba(255,255,255,0.2);}

    /* CARD ANIMATIONS */
    @keyframes cardFly{0%{transform:translateY(0) scale(1);opacity:1;}60%{transform:translateY(-80px) scale(1.15) rotate(5deg);opacity:0.7;}100%{transform:translateY(-20px) scale(0.8);opacity:0;}}
    .card-fly{animation:cardFly 0.45s ease forwards;pointer-events:none;}

    @keyframes cardSlide{from{transform:translateX(-40px) scale(0.7);opacity:0;}to{transform:translateX(0) scale(1);opacity:1;}}
    .card-slide{animation:cardSlide 0.3s cubic-bezier(.34,1.56,.64,1) both;}

    @keyframes discardPop{0%{transform:scale(0.7) rotate(-10deg);}70%{transform:scale(1.08) rotate(2deg);}100%{transform:scale(1) rotate(0deg);}}
    .discard-pop{animation:discardPop 0.35s cubic-bezier(.34,1.56,.64,1) both;}

    /* DIRECTION */
    .dir-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;}
    .dir-icon{font-size:22px;transition:transform 0.5s;}
    .dir-label{font-size:9px;color:#444466;letter-spacing:1px;text-transform:uppercase;}

    /* TURN INDICATOR */
    .turn-ind{text-align:center;padding:8px 24px;font-size:13px;color:#555577;}
    .turn-ind.my-turn{color:#ffd166;font-weight:800;font-size:15px;text-shadow:0 0 20px rgba(255,209,102,0.5);}

    /* HAND AREA */
    .hand-area{padding:12px 20px 28px;}
    .hand-label{font-size:10px;color:#333355;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
    .hand-cards{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}

    /* DANGER METER */
    .danger-meter{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:8px;min-height:24px;}
    .danger-text{font-size:12px;font-weight:700;color:#e63946;animation:dangerPulse 1s ease-in-out infinite;}
    @keyframes dangerPulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

    /* UNO BUTTON */
    .uno-btn-wrap{display:flex;justify-content:center;margin-top:14px;}
    .uno-shout-btn{padding:11px 36px;border-radius:50px;background:linear-gradient(135deg,#ffd166,#e9a808);color:#1a0f00;font-size:16px;font-weight:900;border:none;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px rgba(255,209,102,0.45);transition:transform 0.15s,box-shadow 0.15s;letter-spacing:2px;}
    .uno-shout-btn:hover{transform:scale(1.1);box-shadow:0 8px 30px rgba(255,209,102,0.6);}
    .uno-shout-btn:disabled{opacity:0.3;cursor:default;transform:none;}
    @keyframes unoShout{0%{transform:scale(1);}30%{transform:scale(1.5) rotate(-5deg);}60%{transform:scale(1.3) rotate(3deg);}100%{transform:scale(1);}}
    .uno-animate{animation:unoShout 0.6s cubic-bezier(.34,1.56,.64,1) both;}

    /* COLOR PICKER */
    .color-picker-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);z-index:300;align-items:center;justify-content:center;}
    .color-picker-overlay.show{display:flex;}
    .color-picker-card{background:#0d1117;border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:36px;text-align:center;animation:popIn 0.3s cubic-bezier(.34,1.56,.64,1) both;}
    @keyframes popIn{from{opacity:0;transform:scale(0.7);}to{opacity:1;transform:scale(1);}}
    .cp-title{font-size:18px;font-weight:800;color:#f0f0ff;margin-bottom:24px;}
    .color-btns{display:flex;gap:16px;justify-content:center;}
    .color-btn{width:70px;height:70px;border-radius:50%;border:4px solid rgba(255,255,255,0.25);cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;position:relative;overflow:hidden;}
    .color-btn:hover{transform:scale(1.2);box-shadow:0 8px 24px rgba(0,0,0,0.5);}
    .color-btn::after{content:attr(data-label);position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:10px;color:#8888aa;white-space:nowrap;}
    .cb-red   {background:linear-gradient(135deg,#e63946,#c1121f);}
    .cb-blue  {background:linear-gradient(135deg,#0077b6,#023e8a);}
    .cb-green {background:linear-gradient(135deg,#2d9e47,#1a6b2e);}
    .cb-yellow{background:linear-gradient(135deg,#f4c430,#c99000);}

    /* WIN SCREEN */
    .win-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(12px);z-index:800;align-items:center;justify-content:center;}
    .win-overlay.show{display:flex;}
    .win-card{background:#0d1117;border:1px solid rgba(255,255,255,0.12);border-radius:28px;padding:52px 44px;text-align:center;animation:popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;width:420px;max-width:90vw;}
    .win-icon{font-size:72px;margin-bottom:16px;display:block;animation:winBounce 0.8s cubic-bezier(.34,1.56,.64,1) both 0.2s;}
    @keyframes winBounce{from{transform:scale(0) rotate(-20deg);}to{transform:scale(1) rotate(0deg);}}
    .win-title{font-size:32px;font-weight:900;color:#f0f0ff;margin-bottom:8px;}
    .win-sub{font-size:14px;color:#555577;margin-bottom:32px;}
    .win-btns{display:flex;gap:12px;}
    .win-btn{flex:1;padding:14px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border:none;transition:transform 0.15s;}
    .win-btn:hover{transform:translateY(-2px);}
    .wb-p{background:linear-gradient(135deg,#e63946,#c1121f);color:#fff;box-shadow:0 4px 16px rgba(230,57,70,0.35);}
    .wb-g{background:rgba(255,255,255,0.05);color:#8888aa;border:1px solid rgba(255,255,255,0.1);}

    @media(max-width:600px){
      .uno-card{width:58px;height:88px;}
      .card-mid{font-size:22px;}
      .hand-cards{gap:4px;}
    }
  </style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>
<div class="flash-overlay" id="flashOverlay"></div>
<div class="toast" id="toast"></div>
<div class="turn-banner" id="turnBanner">
  <div class="turn-banner-name" id="turnBannerName"></div>
  <div class="turn-banner-sub" id="turnBannerSub"></div>
</div>

<!-- LOBBY -->
<div id="lobbyScreen">
  <div class="lobby-card">
    <div class="lobby-title">🃏 UNO</div>
    <div class="lobby-sub" id="lobbySub">Oda bekleniyor...</div>
    <div class="room-code-big" id="lobbyCode">——————</div>
    <button class="copy-btn" onclick="copyCode()">📋 Kodu Kopyala — Arkadaşına Gönder</button>
    <div class="players-label">Odadaki Oyuncular</div>
    <div class="players-list" id="playersList"></div>
    <button class="start-btn" id="startBtn" disabled onclick="startGame()">Oyunu Başlat</button>
    <a class="back-link" href="../index.html">← Ana Sayfaya Dön</a>
  </div>
</div>

<!-- GAME -->
<div id="gameScreen">
  <div class="gtop">
    <div class="gtop-logo">🃏 UNO</div>
    <div class="room-pill">Oda: <span id="roomCodeDisplay">——</span></div>
  </div>
  <div class="timer-wrap">
    <div class="timer-fill" id="timerFill"></div>
  </div>
  <div class="opponents-row" id="opponentsRow"></div>
  <div class="table-area">
    <div style="position:relative;">
      <div class="deck-pile" id="deckPile" onclick="drawCard()"></div>
      <div class="deck-count" id="deckCount">— kart</div>
    </div>
    <div class="dir-wrap">
      <div class="dir-icon" id="dirIcon">↻</div>
      <div class="dir-label" id="dirLabel">Saat yönü</div>
    </div>
    <div class="discard-pile" id="discardPile"></div>
  </div>
  <div class="turn-ind" id="turnInd">Bekleniyor...</div>
  <div class="hand-area">
    <div class="hand-label"><span>Elindeki Kartlar</span><span id="handCount" style="color:#555577">0 kart</span></div>
    <div class="hand-cards" id="handCards"></div>
    <div class="danger-meter" id="dangerMeter"></div>
    <div class="uno-btn-wrap">
      <button class="uno-shout-btn" id="unoBtn" disabled onclick="shoutUno()">UNO!</button>
    </div>
  </div>
</div>

<!-- COLOR PICKER -->
<div class="color-picker-overlay" id="colorPicker">
  <div class="color-picker-card">
    <div class="cp-title">🌈 Renk Seç</div>
    <div class="color-btns">
      <button class="color-btn cb-red"    data-label="Kırmızı" onclick="pickColor('red')"></button>
      <button class="color-btn cb-blue"   data-label="Mavi"    onclick="pickColor('blue')"></button>
      <button class="color-btn cb-green"  data-label="Yeşil"   onclick="pickColor('green')"></button>
      <button class="color-btn cb-yellow" data-label="Sarı"    onclick="pickColor('yellow')"></button>
    </div>
  </div>
</div>

<!-- WIN -->
<div class="win-overlay" id="winOverlay">
  <div class="win-card">
    <span class="win-icon" id="winIcon">🏆</span>
    <div class="win-title" id="winTitle">Kazandın!</div>
    <div class="win-sub"   id="winSub">Tebrikler!</div>
    <div class="win-btns">
      <button class="win-btn wb-p" onclick="location.reload()">Tekrar Oyna</button>
      <button class="win-btn wb-g" onclick="location.href='../index.html'">Ana Sayfa</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB = {
  apiKey:"AIzaSyB6Xq0_T9m91C6ipc9ya3_6ZcX2aLrRpKc",
  authDomain:"oyunevi-f15d3.firebaseapp.com",
  databaseURL:"https://oyunevi-f15d3-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"oyunevi-f15d3",
  storageBucket:"oyunevi-f15d3.firebasestorage.app",
  messagingSenderId:"951375448199",
  appId:"1:951375448199:web:de5e9f9ae8262574261022"
};
const app=initializeApp(FB);
const db=getDatabase(app);

const params=new URLSearchParams(location.search);
const ROOM=params.get('room')||'';
const ME=decodeURIComponent(params.get('name')||'Oyuncu');
const IS_HOST=params.get('host')==='1';
const roomRef=ref(db,`rooms/${ROOM}`);

document.getElementById('lobbyCode').textContent=ROOM;
document.getElementById('roomCodeDisplay').textContent=ROOM;

// ── SOUNDS (Web Audio API — sıfır maliyet) ──
const AC=new (window.AudioContext||window.webkitAudioContext)();
function playSound(type){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    const t=AC.currentTime;
    if(type==='play'){
      o.frequency.setValueAtTime(520,t);o.frequency.exponentialRampToValueAtTime(780,t+0.08);
      g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
      o.start(t);o.stop(t+0.18);
    }else if(type==='draw'){
      o.type='triangle';
      o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(200,t+0.12);
      g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
      o.start(t);o.stop(t+0.15);
    }else if(type==='uno'){
      o.type='square';
      o.frequency.setValueAtTime(880,t);o.frequency.setValueAtTime(1100,t+0.08);o.frequency.setValueAtTime(880,t+0.16);
      g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      o.start(t);o.stop(t+0.4);
    }else if(type==='win'){
      [523,659,784,1047].forEach((f,i)=>{
        const o2=AC.createOscillator(),g2=AC.createGain();
        o2.connect(g2);g2.connect(AC.destination);
        o2.frequency.value=f;
        g2.gain.setValueAtTime(0.15,t+i*0.1);
        g2.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.3);
        o2.start(t+i*0.1);o2.stop(t+i*0.1+0.3);
      });
      return;
    }else if(type==='punish'){
      o.type='sawtooth';
      o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(80,t+0.25);
      g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      o.start(t);o.stop(t+0.3);
    }
  }catch(e){}
}

// ── CONFETTI ──
const canvas=document.getElementById('confettiCanvas');
const ctx=canvas.getContext('2d');
let confettiPieces=[];
function launchConfetti(){
  canvas.width=innerWidth;canvas.height=innerHeight;
  confettiPieces=Array.from({length:180},()=>({
    x:Math.random()*innerWidth,y:-10,
    vx:(Math.random()-0.5)*6,vy:Math.random()*4+2,
    color:['#e63946','#ffd166','#0077b6','#2d9e47','#b5179e','#00b4d8'][Math.floor(Math.random()*6)],
    size:Math.random()*8+4,rot:Math.random()*360,vrot:(Math.random()-0.5)*8
  }));
  requestAnimationFrame(animateConfetti);
}
function animateConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confettiPieces=confettiPieces.filter(p=>p.y<canvas.height+20);
  confettiPieces.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.rot+=p.vrot;
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
    ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
    ctx.restore();
  });
  if(confettiPieces.length>0)requestAnimationFrame(animateConfetti);
}

// ── FLASH ──

  const el=document.getElementById('flashOverlay');
  el.classList.add('flash');
  setTimeout(()=>el.classList.remove('flash'),200);
}

// ── TURN BANNER ──
let bannerTimeout;
function showTurnBanner(name,isMe){
  const b=document.getElementById('turnBanner');
  document.getElementById('turnBannerName').textContent=isMe?'⭐ Senin Sıran!':name+' Oynuyor';
  document.getElementById('turnBannerSub').textContent=isMe?'Bir kart oyna veya çek':'Bekle...';
  b.style.borderColor=isMe?'rgba(255,209,102,0.4)':'rgba(255,255,255,0.15)';
  b.classList.add('show');

}

// ── TOAST ──
let toastT;
function toast(msg,color){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.borderColor=color?`rgba(${color},0.4)`:'rgba(255,255,255,0.15)';
  t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2500);
}

// ── TIMER ──
let timerInterval,timerSecs=15;
function startTimer(isMyTurn){
  clearInterval(timerInterval);
  timerSecs=15;
  const fill=document.getElementById('timerFill');
  fill.style.width='100%';
  fill.classList.remove('danger');
  timerInterval=setInterval(async()=>{
    timerSecs--;
    const pct=Math.max(0,(timerSecs/15)*100);
    fill.style.width=pct+'%';
    if(timerSecs<=5){fill.classList.add('danger');}
    if(timerSecs<=0){
      clearInterval(timerInterval);
      if(isMyTurn){await drawCard(true);toast('⏰ Süre doldu, kart çekildi!');}
    }
  },1000);
}

// ── DECK & HELPERS ──
const COLORS=['red','blue','green','yellow'];
const CLABEL={skip:'⊘',reverse:'⇄',draw2:'+2',wild:'🌈',wild4:'+4'};
const PCOLORS=['#e63946','#0077b6','#2d9e47','#f4c430','#7209b7','#00b4d8'];
function lbl(c){return CLABEL[c.value]??c.value;}
function gradOf(c){const m={red:'#e63946,#9b0b16',blue:'#0077b6,#023e8a',green:'#2d9e47,#1a5e2a',yellow:'#f4c430,#c99000',black:'#2d2d44,#0d0d18'};return m[c.color]||m.black;}
function canPlay(card,top,ac){if(card.color==='black')return true;const c=ac||top.color;return card.color===c||card.value===top.value;}
function makeDeck(){
  const d=[];
  COLORS.forEach(c=>{
    for(let n=0;n<=9;n++){d.push({color:c,value:''+n});if(n>0)d.push({color:c,value:''+n});}
    ['skip','reverse','draw2'].forEach(s=>{d.push({color:c,value:s});d.push({color:c,value:s});});
  });
  for(let i=0;i<4;i++){d.push({color:'black',value:'wild'});d.push({color:'black',value:'wild4'});}
  return shuffle(d);
}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

// ── STATE ──
let gs=null,pendingWild=null,lastTurn=-1;

// ── LOBBY ──
async function joinLobby(){
  const snap=await get(roomRef);
  if(!snap.exists()){
    await set(roomRef,{game:'uno',host:ME,status:'waiting',players:{[ME]:{name:ME,order:0}},createdAt:Date.now()});
  }else{
    const order=Object.keys(snap.val().players||{}).length;
    await update(ref(db,`rooms/${ROOM}/players`),{[ME]:{name:ME,order}});
  }
  onValue(roomRef,snap=>{
    if(!snap.exists())return;
    const d=snap.val();
    if(d.status==='playing'||d.status==='finished'){gs=d;showGame();return;}
    const names=Object.keys(d.players||{});
    renderLobbyPlayers(names,d.host);
    const btn=document.getElementById('startBtn');
    if(IS_HOST&&names.length>=2){btn.disabled=false;btn.textContent=`Oyunu Başlat (${names.length} oyuncu)`;}
    else if(IS_HOST){btn.disabled=true;btn.textContent='Oyunu Başlat (en az 2 kişi)';}
    else{btn.disabled=true;btn.textContent='Host başlatmayı bekle...';}
    document.getElementById('lobbySub').textContent=IS_HOST?'Arkadaşlarını bekle, sonra başlat.':'Host başlatana kadar bekle.';
  });
}

function renderLobbyPlayers(names,host){
  const list=document.getElementById('playersList');list.innerHTML='';
  names.forEach((n,i)=>{
    const d=document.createElement('div');d.className='player-item';
    d.innerHTML=`<div class="player-avatar" style="background:${PCOLORS[i%6]}22;color:${PCOLORS[i%6]}">${n[0].toUpperCase()}</div><span class="player-name">${n}</span>${n===host?'<span class="host-badge">HOST</span>':'<span class="waiting-badge">Hazır</span>'}`;
    list.appendChild(d);
  });
}

window.copyCode=()=>navigator.clipboard.writeText(ROOM).then(()=>toast('Kod kopyalandı! 📋'));

window.startGame=async()=>{
  const snap=await get(roomRef);const d=snap.val();
  const names=Object.keys(d.players||{});
  const deck=makeDeck();const hands={};
  names.forEach(n=>hands[n]=[]);
  for(let i=0;i<7;i++)names.forEach(n=>hands[n].push(deck.pop()));
  let top=deck.pop();
  while(top.color==='black'){deck.unshift(top);top=deck.pop();}
  await update(roomRef,{status:'playing',deck,discard:[top],activeColor:top.color,hands,turn:0,playerOrder:names,direction:1,winner:null,turnStarted:Date.now()});
};

// ── GAME ──
function showGame(){
  document.getElementById('lobbyScreen').style.display='none';
  document.getElementById('gameScreen').style.display='flex';
  onValue(roomRef,snap=>{
    if(!snap.exists())return;
    gs=snap.val();
    if(gs.status!=='playing'&&gs.status!=='finished')return;
    render();
  });
}

let lastRenderedTurn=-1;
function render(){
  if(!gs)return;
  const order=gs.playerOrder||[];
  const turn=(gs.turn||0)%order.length;
  const cur=order[turn];
  const isMe=cur===ME;
  const discard=gs.discard||[];
  const top=discard[discard.length-1]||{color:'red',value:'0'};
  const ac=gs.activeColor||top.color;

  // Turn change detection
  if(gs.turn!==lastRenderedTurn){
    lastRenderedTurn=gs.turn;
    showTurnBanner(cur,isMe);
    startTimer(isMe);
  }

  // Discard pile
  const dp=document.getElementById('discardPile');
  dp.style.background=`linear-gradient(135deg,${gradOf({color:ac})})`;
  dp.style.color=ac==='yellow'?'#1a0f00':'#fff';
  dp.innerHTML=`<span class="card-tl">${lbl(top)}</span><span class="card-mid">${lbl(top)}</span><span class="card-br">${lbl(top)}</span>`;
  dp.classList.remove('discard-pop');void dp.offsetWidth;dp.classList.add('discard-pop');

  // Deck
  document.getElementById('deckCount').textContent=`${(gs.deck||[]).length} kart`;

  // Direction
  document.getElementById('dirIcon').textContent=gs.direction===1?'↻':'↺';
  document.getElementById('dirLabel').textContent=gs.direction===1?'Saat yönü':'Ters yön';

  // Turn indicator
  const ti=document.getElementById('turnInd');
  ti.textContent=isMe?'⭐ Senin sıran — oyna veya çek!':` ${cur} oynuyor...`;
  ti.className='turn-ind'+(isMe?' my-turn':'');

  // Opponents
  const row=document.getElementById('opponentsRow');row.innerHTML='';
  order.filter(n=>n!==ME).forEach((n,i)=>{
    const idx=order.indexOf(n);const act=idx===turn;
    const cnt=(gs.hands?.[n]||[]).length;
    const danger=cnt<=2;
    const chip=document.createElement('div');
    chip.className='opp-chip'+(act?' active-turn':'')+(danger?' danger-zone':'');
    chip.innerHTML=`<div class="opp-avatar" style="background:${PCOLORS[i%6]}22;color:${PCOLORS[i%6]}">${n[0].toUpperCase()}</div><span>${n}</span><span class="opp-cards">${cnt} kart</span>${danger?'<span class="danger-badge">⚠️ UNO!</span>':''}`;
    row.appendChild(chip);
  });

  // My hand
  const hand=gs.hands?.[ME]||[];
  document.getElementById('handCount').textContent=`${hand.length} kart`;
  const hc=document.getElementById('handCards');hc.innerHTML='';
  hand.forEach((card,i)=>{
    const ok=isMe&&canPlay(card,top,ac);
    const div=document.createElement('div');
    div.className=`uno-card card-${card.color}${ok?' playable':' unplayable'} card-slide`;
    div.style.animationDelay=`${i*0.04}s`;
    if(card.color==='yellow')div.style.color='#1a0f00';
    div.innerHTML=`<span class="card-tl">${lbl(card)}</span><span class="card-mid">${lbl(card)}</span><span class="card-br">${lbl(card)}</span>`;
    if(ok)div.onclick=()=>playCard(i,card,div);
    hc.appendChild(div);
  });

  // Danger meter (my cards)
  const dm=document.getElementById('dangerMeter');dm.innerHTML='';
  if(hand.length<=3&&hand.length>0){
    const colors={3:'#f4c430',2:'#ff8800',1:'#e63946'};
    const msgs={3:'⚠️ Az kartın kaldı!',2:'🔥 Tehlike bölgesi!',1:'🚨 UNO! Bir kartın kaldı!'};
    const span=document.createElement('span');
    span.className='danger-text';
    span.style.color=colors[Math.min(hand.length,3)]||'#e63946';
    span.textContent=msgs[Math.min(hand.length,3)]||'';
    dm.appendChild(span);
    if(hand.length===1)document.getElementById('unoBtn').disabled=!isMe;
  }

  // UNO button
  if(hand.length!==1)document.getElementById('unoBtn').disabled=true;

  // Win
  if(gs.winner)showWin(gs.winner);
}

async function playCard(idx,card,el){
  const order=gs.playerOrder;const turn=(gs.turn||0)%order.length;
  if(order[turn]!==ME){toast('Sıran değil! ⏳');return;}
  if(card.color==='black'){pendingWild={idx,card};document.getElementById('colorPicker').classList.add('show');return;}
  el?.classList.add('card-fly');
  playSound('play');
  setTimeout(()=>applyCard(idx,card,card.color),200);
}

window.pickColor=async(color)=>{
  document.getElementById('colorPicker').classList.remove('show');
  if(!pendingWild)return;
  playSound('play');
  await applyCard(pendingWild.idx,pendingWild.card,color);
  pendingWild=null;
};

async function applyCard(idx,card,ac){
  let deck=[...(gs.deck||[])];
  let discard=[...(gs.discard||[])];
  let hands=JSON.parse(JSON.stringify(gs.hands||{}));
  let dir=gs.direction||1;let skip=false;
  const order=gs.playerOrder;const turn=(gs.turn||0)%order.length;

  hands[ME].splice(idx,1);
  discard.push({...card,activeColor:ac});

  if(hands[ME].length===0){
    clearInterval(timerInterval);
    await update(roomRef,{hands,discard,activeColor:ac,winner:ME,status:'finished'});
    return;
  }

  if(card.value==='reverse'){dir*=-1;if(order.length===2)skip=true;}
  if(card.value==='skip')skip=true;
  if(card.value==='draw2'||card.value==='wild4'){
    const cnt=card.value==='draw2'?2:4;
    const next=(turn+dir+order.length)%order.length;
    for(let i=0;i<cnt;i++){
      if(deck.length===0){deck=shuffle(discard.slice(0,-1));discard=[discard[discard.length-1]];}
      hands[order[next]].push(deck.pop());
    }
    skip=true;
    flash();playSound('punish');
    if(order[next]===ME){
      document.getElementById('gameScreen').classList.add('shake');
      setTimeout(()=>document.getElementById('gameScreen').classList.remove('shake'),500);
      toast(`${cnt===2?'+2':'+4'} kart çektin! 😱`,'230,57,70');
    }else{
      toast(`${order[next]} ${cnt===2?'+2':'+4'} kart çekti! 💀`,'255,209,102');
    }
  }

  const newTurn=gs.turn+(skip?2:1);
  await update(roomRef,{hands,discard,deck,activeColor:ac,direction:dir,turn:newTurn,winner:null,status:'playing',turnStarted:Date.now()});
}

window.drawCard=async(auto=false)=>{
  if(!gs)return;
  const order=gs.playerOrder;const turn=(gs.turn||0)%order.length;
  if(order[turn]!==ME){if(!auto)toast('Sıran değil! ⏳');return;}
  let deck=[...(gs.deck||[])];
  let discard=[...(gs.discard||[])];
  let hands=JSON.parse(JSON.stringify(gs.hands||{}));
  if(deck.length===0){deck=shuffle(discard.slice(0,-1));discard=[discard[discard.length-1]];toast('Deste karıştırıldı! 🔀');}
  const drawn=deck.pop();
  hands[ME].push(drawn);
  playSound('draw');
  const top=discard[discard.length-1];const ac=gs.activeColor||top.color;
  const ok=canPlay(drawn,top,ac);
  if(!ok){await update(roomRef,{hands,deck,discard,turn:gs.turn+1,turnStarted:Date.now()});if(!auto)toast('Kart çektin, sıra geçti.');}
  else{await update(roomRef,{hands,deck,discard});if(!auto)toast('Oynayabilirsin! 🎴');}
};

window.shoutUno=()=>{
  playSound('uno');
  const btn=document.getElementById('unoBtn');
  btn.classList.add('uno-animate');btn.disabled=true;
  setTimeout(()=>btn.classList.remove('uno-animate'),600);
  toast('UNO! 🎉','255,209,102');
};

function showWin(w){
  clearInterval(timerInterval);
  const me=w===ME;
  document.getElementById('winIcon').textContent=me?'🏆':'😢';
  document.getElementById('winTitle').textContent=me?'Kazandın!':w+' Kazandı!';
  document.getElementById('winSub').textContent=me?'Tüm kartlarını bitirdin! Harika oyun!':'Bir sonraki oyunda şansın yaver gitsin!';
  document.getElementById('winOverlay').classList.add('show');
  if(me){launchConfetti();playSound('win');}
}

joinLobby();
</script>
