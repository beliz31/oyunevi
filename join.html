<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OyunEvi — Odaya Katıl</title>
  <link rel="stylesheet" href="css/main.css"/>
  <style>
    .join-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .join-card {
      background: #0f0f22;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px 36px;
      width: 400px; max-width: 100%;
      text-align: center;
      animation: modalPop 0.3s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes modalPop {
      from { opacity:0; transform:scale(0.9) translateY(10px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }
    .join-icon { font-size: 44px; margin-bottom: 16px; }
    .join-title { font-size: 22px; font-weight: 800; color: #f0f0ff; margin-bottom: 8px; }
    .join-sub { font-size: 13px; color: #555577; margin-bottom: 28px; line-height: 1.6; }
    .room-code-display {
      background: rgba(230,57,70,0.1);
      border: 1px solid rgba(230,57,70,0.25);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 28px;
      font-weight: 900;
      color: #ff8a94;
      letter-spacing: 8px;
      margin-bottom: 24px;
      font-family: monospace;
    }
    .join-game-list { display:flex; gap:10px; justify-content:center; margin-bottom:24px; }
    .join-game-item {
      flex:1; background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.07);
      border-radius:12px; padding:14px 8px;
      display:flex; flex-direction:column; align-items:center; gap:6px;
      cursor:pointer; transition:all 0.15s;
    }
    .join-game-item:hover { background:rgba(255,255,255,0.08); }
    .join-game-item.selected { border-color:#e63946; background:rgba(230,57,70,0.1); }
    .jgi-icon { font-size:22px; }
    .jgi-name { font-size:11px; font-weight:600; color:#666688; }
    .join-game-item.selected .jgi-name { color:#ff8a94; }
    .join-btn {
      width:100%; background:#e63946; color:#fff;
      border:none; border-radius:12px; padding:13px;
      font-size:14px; font-weight:700; cursor:pointer;
      font-family:inherit; box-shadow:0 4px 16px rgba(230,57,70,0.3);
      transition:opacity 0.15s, transform 0.15s;
    }
    .join-btn:hover { opacity:0.9; transform:translateY(-1px); }
    .back-link { display:block; margin-top:16px; font-size:12px; color:#444466; cursor:pointer; }
    .back-link:hover { color:#8888aa; }
  </style>
</head>
<body>
<div class="join-wrap">
  <div class="join-card">
    <div class="join-icon">🔑</div>
    <div class="join-title">Odaya Katılıyorsun</div>
    <div class="join-sub">Hangi oyuna katılmak istiyorsun?</div>
    <div class="room-code-display" id="displayCode">------</div>

    <div class="join-game-list">
      <div class="join-game-item" data-game="uno" onclick="selectJoinGame(this)">
        <span class="jgi-icon">🃏</span>
        <span class="jgi-name">UNO</span>
      </div>
      <div class="join-game-item" data-game="asmaca" onclick="selectJoinGame(this)">
        <span class="jgi-icon">🪢</span>
        <span class="jgi-name">Adam Asmaca</span>
      </div>
      <div class="join-game-item" data-game="bilgi" onclick="selectJoinGame(this)">
        <span class="jgi-icon">💡</span>
        <span class="jgi-name">Bilgi Yarışması</span>
      </div>
    </div>

    <button class="join-btn" onclick="goJoin()">Odaya Gir →</button>
    <a class="back-link" href="index.html">← Ana Sayfaya Dön</a>
  </div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('room') || '------';
  const name   = params.get('name') || '';
  document.getElementById('displayCode').textContent = code;

  let selectedGame = null;
  function selectJoinGame(el) {
    document.querySelectorAll('.join-game-item').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
    selectedGame = el.dataset.game;
  }
  function goJoin() {
    if (!selectedGame) { alert('Lütfen bir oyun seç!'); return; }
    window.location.href = `games/${selectedGame}.html?room=${code}&name=${encodeURIComponent(name)}&host=0`;
  }
</script>
</body>
</html>
